services:
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: tracking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tracking_db}
      MYSQL_USER: ${MYSQL_USER:-tracking_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tracking_password}
      TZ: 'Asia/Ho_Chi_Minh'
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tracking-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracking-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-tracking_user}:${MYSQL_PASSWORD:-tracking_password}@mysql:3306/${MYSQL_DATABASE:-tracking_db}
      TZ: 'Asia/Ho_Chi_Minh'
    networks:
      - tracking-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
    driver: local

networks:
  tracking-network:
    driver: bridge
