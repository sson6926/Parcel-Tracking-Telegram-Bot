services:
  bot:
    image: ghcr.io/sson6926/parcel-tracking-telegram-bot:main
    container_name: tracking-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: 'Asia/Ho_Chi_Minh'
    ports:
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT:-8443}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
