name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  release:
    types: [published]

env:
  AZURE_RESOURCE_GROUP: rg-telegram-bot
  AZURE_CONTAINER_APP: telegram-tracking-bot
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get image tag
        id: image
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG=${GITHUB_REF#refs/tags/v}
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.IMAGE_NAME }}:$TAG" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.image.outputs.full_image }} \
            --set-env-vars \
              "CHECK_INTERVAL_MINUTES=5" \
              "LOG_LEVEL=INFO"

      - name: Verify deployment
        run: |
          # Wait for deployment to complete
          sleep 30
          
          # Check provisioning state
          STATE=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.provisioningState" -o tsv)
          
          echo "Provisioning state: $STATE"
          
          if [ "$STATE" != "Succeeded" ]; then
            echo "Deployment failed!"
            exit 1
          fi

      - name: Get deployment info
        run: |
          az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "{name:name, fqdn:properties.configuration.ingress.fqdn, image:properties.template.containers[0].image}" \
            -o table

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.image.outputs.full_image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** \`${{ env.AZURE_RESOURCE_GROUP }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Container App:** \`${{ env.AZURE_CONTAINER_APP }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### View Logs:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "az containerapp logs show \\" >> $GITHUB_STEP_SUMMARY
          echo "  --name ${{ env.AZURE_CONTAINER_APP }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --follow" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs for more details." >> $GITHUB_STEP_SUMMARY
